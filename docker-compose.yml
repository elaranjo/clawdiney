version: '3.8'

services:
  # Neo4j: Graph Database for Knowledge Relationships
  neo4j:
    image: neo4j:latest
    container_name: clawdiney-neo4j
    ports:
      - "7474:7474"  # Neo4j Browser (Web UI)
      - "7687:7687"  # Bolt Protocol (Database Connection)
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./neo4j_data:/data
    networks:
      - brain-network
    restart: unless-stopped

  # ChromaDB: Vector Database for Semantic Search
  chromadb:
    image: chromadb/chroma:latest
    container_name: clawdiney-chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    networks:
      - brain-network
    restart: unless-stopped

  # Clawdiney MCP Server
  brain-mcp-server:
    build: .
    container_name: clawdiney-mcp-server
    ports:
      - "8006:8006"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - VAULT_PATH=/vault
      - MODEL_NAME=bge-m3:latest
    volumes:
      - ~/Documents/ObsidianVault:/vault
    networks:
      - brain-network
    restart: unless-stopped
    depends_on:
      - chromadb
      - neo4j

networks:
  brain-network:
    driver: bridge
