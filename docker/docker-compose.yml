services:
  # Redis: Cache for Query Results
  redis:
    image: redis:7-alpine
    container_name: clawdiney-redis
    ports:
      - "6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - ../redis_data:/data
    networks:
      - brain-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Neo4j: Graph Database for Knowledge Relationships
  neo4j:
    image: ${NEO4J_IMAGE:-neo4j:latest}
    container_name: clawdiney-neo4j
    ports:
      - "7475:7474"  # Neo4j Browser (Web UI)
      - "7688:7687"  # Bolt Protocol (Database Connection)
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ../neo4j_data:/data
    networks:
      - brain-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}\" \"RETURN 1;\" >/dev/null 2>&1"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 60s

  # ChromaDB: Vector Database for Semantic Search
  chromadb:
    image: ${CHROMA_IMAGE:-chromadb/chroma:latest}
    container_name: clawdiney-chromadb
    ports:
      - "8001:8000"
    volumes:
      - ../chroma_data:/chroma/chroma
    networks:
      - brain-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # MCP Server: Model Context Protocol for AI Agents
  mcp-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: clawdiney-mcp-server
    ports:
      - "8006:8006"  # MCP Server port
    volumes:
      - ${VAULT_PATH:-/vault}:/vault:ro
    environment:
      - VAULT_PATH=/vault
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      - MODEL_NAME=${MODEL_NAME:-bge-m3:latest}
      - RERANK_MODEL_NAME=${RERANK_MODEL_NAME:-}
      - MCP_TRANSPORT=stdio
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - brain-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  brain-network:
    driver: bridge
